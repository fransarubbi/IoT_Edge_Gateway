syntax = "proto3";

package grpc;

service EdgeService {
  // Streaming Bidireccional
  rpc ConnectStream(stream FromEdge) returns (stream ToEdge);
}

// =================
// CARRIL DE SUBIDA
// =================
message FromEdge {
  string edge_id = 1;
  oneof payload {
    Measurement measurement = 2;
    Monitor monitor = 3;
    AlertAir alert_air = 4;
    AlertTh alert_th = 5;
    SystemMetrics metrics = 6;
    Settings settings = 7;
    SettingOk setting_ok = 8;
    FirmwareOutcome firmware_outcome = 9;
    HelloWorld hello_world = 10;
    MeasurementBatch measurement_batch = 11;
    MonitorBatch monitor_batch = 12;
    AlertAirBatch alert_air_batch = 13;
    AlertThBatch alert_th_batch = 14;
    EdgeState edge_state = 15;
    NetworkAck network_ack = 16;
    HubState hub_state = 17;
  }
}

// =================
// CARRIL DE BAJADA
// =================
message ToEdge {
  string edge_id = 1;
  oneof payload {
    SettingOk setting_ok = 2;
    UpdateFirmware update_firmware = 3;
    Network network = 4;
    DeleteHub delete_hub = 5;
    Settings settings = 6;
    Heartbeat heartbeat = 7;
    HelloWorld hello_world = 8;
  }
}

message Metadata {
  string sender_user_id = 1;
  string destination_id = 2;
  int64 timestamp = 3;
}

message Measurement {
  Metadata metadata = 1;
  string network = 2;
  float pulse_counter = 3;
  float pulse_max_duration = 4;
  float temperature = 5;
  float humidity = 6;
  float air_quality = 7;
  uint32 sample = 8;
}

message AlertAir {
  Metadata metadata = 1;
  string network = 2;
  float initial_air_quality = 3;
  float actual_air_quality = 4;
}

message AlertTh {
  Metadata metadata = 1;
  string network = 2;
  float initial_temp = 3;
  float actual_temp = 4;
}

message Monitor {
  Metadata metadata = 1;
  string network = 2;
  uint32 heap_free = 3;
  uint32 heap_min_free = 4;
  uint32 heap_largest_block = 5;
  uint64 uptime_sec = 6;
}

message HubState {
  Metadata metadata = 1;
  string network = 2;
  string state = 3;
}

message MeasurementBatch {
  repeated Measurement measurements = 1;
}

message MonitorBatch {
  repeated Monitor monitors = 1;
}

message AlertAirBatch {
  repeated AlertAir alerts = 1;
}

message AlertThBatch {
  repeated AlertTh alerts = 1;
}

message Settings {
  Metadata metadata = 1;
  uint32 message_id = 2;
  string network = 3;
  string wifi_ssid = 4;
  string wifi_password = 5;
  string mqtt_uri = 6;
  string device_name = 7;
  uint32 sample = 8;
  uint32 energy_mode = 9;
}

message SettingOk {
  Metadata metadata = 1;
  uint32 message_id = 2;
  string network = 3;
  bool handshake = 4;
}

message Network {
  Metadata metadata = 1;
  string id_network = 2;
  string name_network = 3;
  bool active = 4;
  bool delete_network = 5;
}

message NetworkAck {
  Metadata metadata = 1;
  string id_network = 2;
  uint32 code_of_ack = 3;
}

message DeleteHub {
  Metadata metadata = 1;
  string network = 2;
}

message ActiveHub {
  Metadata metadata = 1;
  string network = 2;
  bool active = 3;
}

message Heartbeat {
  Metadata metadata = 1;
  bool beat = 2;
}

message UpdateFirmware {
  Metadata metadata = 1;
  string network = 2;
}

message FirmwareOutcome {
  Metadata metadata = 1;
  string network = 2;
  bool is_ok = 3;
  float percentage_ok = 4;
}

message HelloWorld {
  Metadata metadata = 1;
  bool hello = 2;
}

message SystemMetrics {
  Metadata metadata = 1;
  uint64 uptime_seconds = 2;
  float cpu_usage_percent = 3;
  float cpu_temp_celsius = 4;
  uint64 ram_total_mb = 5;
  uint64 ram_used_mb = 6;
  uint64 sd_total_gb = 7;
  uint64 sd_used_gb = 8;
  float sd_usage_percent = 9;
  uint64 network_rx_bytes = 10;
  uint64 network_tx_bytes = 11;
  int32 wifi_rssi = 12;
  int32 wifi_signal_dbm = 13;
}

message EdgeState {
  Metadata metadata = 1;
  string state = 2;
}
